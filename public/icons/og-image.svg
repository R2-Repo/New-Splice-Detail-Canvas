<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Splice Detail Canvas sharing image</title>
  <desc id="desc">A branded sharing card showing splice detail lines becoming a node workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="570" gradientUnits="userSpaceOnUse">
