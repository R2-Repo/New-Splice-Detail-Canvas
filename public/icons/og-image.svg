      <stop offset=".55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="230" x2="760" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".5" stop-color="#ff6b2c"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="210" fill="#ff6b2c" opacity=".08"/>
  <circle cx="150" cy="560" r="260" fill="#38bdf8" opacity=".08"/>

  <g transform="translate(110 104)">
    <rect width="380" height="380" rx="88" fill="#020617" opacity=".42"/>
    <circle cx="92" cy="190" r="45" fill="#f8fafc"/>
    <circle cx="92" cy="190" r="29" fill="#0f172a"/>
    <circle cx="92" cy="190" r="14" fill="#38bdf8"/>

    <circle cx="305" cy="112" r="34" fill="#f8fafc"/>
    <circle cx="305" cy="112" r="19" fill="#7dd3fc"/>
    <circle cx="305" cy="190" r="38" fill="#f8fafc"/>
    <circle cx="305" cy="190" r="22" fill="#ff6b2c"/>
    <circle cx="305" cy="268" r="34" fill="#f8fafc"/>
    <circle cx="305" cy="268" r="19" fill="#34d399"/>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M114 190H172" stroke="#64748b" stroke-width="15"/>
      <path d="M135 155c35 0 43 35 72 35" stroke="#38bdf8" stroke-width="15"/>
      <path d="M135 190h72" stroke="#ff6b2c" stroke-width="16"/>
