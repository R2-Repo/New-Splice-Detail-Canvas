<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fiber Splicing Tool – Enhanced Multi-Select</title>
  <style>
    /* Basic Reset and Container */
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 10px;
    }
    .container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      max-width: 1200px;
      margin: auto;
    }
    /* Panel Styles */
    .panel {
      width: 250px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .connections-panel {
      flex-grow: 1;
      min-width: 400px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      text-align: center;
    }
    /* Dropdown and Button Styles */
    select, button, input[type="file"] {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    /* Tube & Fiber Styles */
    .tube {
      display: flex;
      align-items: center;
      padding: 5px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      user-select: none;
    }
    .tube span {
      margin-left: 8px;
    }
    .fiber-list {
      display: none;
      padding-left: 15px;
    }
    .tube.open + .fiber-list {
      display: block;
    }
    .fiber {
      display: flex;
      align-items: center;
      font-size: 12px;
      padding: 4px;
      margin: 2px 0;
      cursor: pointer;
      background-color: #fafafa;
      user-select: none;
    }
    /* Selected fibers: light-green background */
    .fiber.selected {
      background-color: #aaffaa;
    }
    /* Connected fibers: bold text (instead of red border) */
    .fiber.connected {
      font-weight: bold;
    }
    /* Color Box with Black Border */
    .color-box {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      border: 1px solid black;
      cursor: pointer;
    }
    /* Connections List */
    .connections {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #ddd;
      margin-top: 10px;
      padding-top: 10px;
      background: #fff;
    }
    .connection {
      padding: 6px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .connection:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Left Panel -->
  <div class="panel">
    <h3>Sheath:</h3>
    <select id="leftCableSelect" onchange="updateTubeList('left')"></select>
    <div id="leftTubes"></div>
  </div>
  <!-- Center Panel -->
  <div class="connections-panel">
    <h3>Connections</h3>
    <button onclick="addConnection()">Add Connection</button>
    <div id="connectionsList" class="connections"></div>
  </div>
  <!-- Right Panel -->
  <div class="panel">
    <h3>Sheath:</h3>
    <select id="rightCableSelect" onchange="updateTubeList('right')"></select>
    <div id="rightTubes"></div>
  </div>
</div>

<div style="text-align: center; margin-top: 20px;">
  <button onclick="addCable()">Add New Cable</button>
  <button onclick="exportData()">Export JSON</button>
  <input type="file" id="jsonInput" accept=".json" onchange="importData(event)">
</div>

<script>
  /* --- Global Data --- */
  let cables = [];    // Each cable: { id, name, tubes, fibersPerTube }
  let splices = [];   // Each splice: { id, left: { cableId, tube, fiber }, right: { cableId, tube, fiber } }
  // For multi-select, arrays for each side:
  let selectedLeft = [];
  let selectedRight = [];
  // To support shift‑selection, store the last selected fiber per side:
  let lastSelectedLeft = null;
  let lastSelectedRight = null;
  // To preserve expanded state across re‑renders, store open tube state per side & cable.
  // Structure: { left: { [cableId]: { [tubeNumber]: true } }, right: { ... } }
  let tubeOpenStates = { left: {}, right: {} };

  // Standard Fiber Optic Color Code (abbreviated)
  const fiberColors = [
    { name: "BL", code: "#0000FF" },
    { name: "OR", code: "#FFA500" },
    { name: "GR", code: "#008000" },
    { name: "BR", code: "#A52A2A" },
    { name: "SL", code: "#708090" },
    { name: "WH", code: "#FFFFFF" },
    { name: "RD", code: "#FF0000" },
    { name: "BK", code: "#000000" },
    { name: "YL", code: "#FFFF00" },
    { name: "VI", code: "#EE82EE" },
    { name: "RS", code: "#FF007F" },
    { name: "AQ", code: "#00FFFF" }
  ];

  // Utility: Generate unique ID
  function generateId() {
    return '_' + Math.random().toString(36).substr(2, 9);
  }

  /* --- Cable Management --- */
  function addCable() {
    let name = prompt("Enter cable name:");
    if (!name) return;
    let tubeCount = parseInt(prompt("Enter number of buffer tubes:"), 10);
    let fibersPerTube = parseInt(prompt("Enter number of fibers per tube:"), 10);
    if (!tubeCount || !fibersPerTube) return;
    cables.push({ id: generateId(), name, tubes: tubeCount, fibersPerTube });
    populateDropdowns();
  }

  function populateDropdowns() {
    let leftSelect = document.getElementById("leftCableSelect");
    let rightSelect = document.getElementById("rightCableSelect");
    leftSelect.innerHTML = "";
    rightSelect.innerHTML = "";
    cables.forEach(cable => {
      let option = document.createElement("option");
      option.value = cable.id;
      option.textContent = cable.name;
      leftSelect.appendChild(option.cloneNode(true));
      rightSelect.appendChild(option.cloneNode(true));
    });
    updateTubeList("left");
    updateTubeList("right");
    updateConnectionsList();
  }

  /* --- Toggle Tube Open State --- */
  function toggleTube(side, cableId, tubeNumber, tubeDiv, fiberList) {
    if (tubeDiv.classList.contains("open")) {
      tubeDiv.classList.remove("open");
      fiberList.style.display = "none";
      if (tubeOpenStates[side][cableId]) {
        delete tubeOpenStates[side][cableId][tubeNumber];
      }
    } else {
      tubeDiv.classList.add("open");
      fiberList.style.display = "block";
      if (!tubeOpenStates[side][cableId]) {
        tubeOpenStates[side][cableId] = {};
      }
      tubeOpenStates[side][cableId][tubeNumber] = true;
    }
  }

  /* --- Render Tubes and Fibers --- */
  function updateTubeList(side) {
    let panel = document.getElementById(side + "Tubes");
    panel.innerHTML = "";
    let cableId = document.getElementById(side + "CableSelect").value;
    let cable = cables.find(c => c.id === cableId);
    if (!cable) return;
    // For this cable, check preserved open state:
    let openStates = tubeOpenStates[side][cableId] || {};
    for (let i = 0; i < cable.tubes; i++) {
      let tubeNumber = i + 1;
      // Create tube element
      let tubeDiv = document.createElement("div");
      tubeDiv.className = "tube";
      tubeDiv.setAttribute("data-tube", tubeNumber);
      let tubeColor = fiberColors[i % fiberColors.length];
      tubeDiv.innerHTML = `<div class="color-box" style="background:${tubeColor.code}"></div><span>${tubeColor.name}</span>`;
      // Create fiber list container
      let fiberList = document.createElement("div");
      fiberList.className = "fiber-list";
      // Populate fibers in this tube
      for (let j = 0; j < cable.fibersPerTube; j++) {
        let fiberNumber = j + 1;
        let fiberDiv = document.createElement("div");
        fiberDiv.className = "fiber";
        fiberDiv.setAttribute("data-fiber", fiberNumber);
        let fiberColor = fiberColors[j % fiberColors.length];
        fiberDiv.innerHTML = `<div class="color-box" style="background:${fiberColor.code}"></div><span>${fiberColor.name}</span>`;
        // Mark as connected if used in a splice
        if (side === "left" && splices.some(s => s.left.cableId === cableId && s.left.tube === tubeNumber && s.left.fiber === fiberNumber)) {
          fiberDiv.classList.add("connected");
        }
        if (side === "right" && splices.some(s => s.right.cableId === cableId && s.right.tube === tubeNumber && s.right.fiber === fiberNumber)) {
          fiberDiv.classList.add("connected");
        }
        // Attach multi-select click handler to the entire fiberDiv.
        fiberDiv.addEventListener("click", function(e) {
          handleFiberClick(side, cableId, tubeNumber, fiberNumber, e);
        });
        fiberList.appendChild(fiberDiv);
      }
      // Attach click handler to the entire tubeDiv (covering color box, abbreviation, and surrounding area)
      tubeDiv.addEventListener("click", function(e) {
        // Only toggle if the click target is the tubeDiv (or its child elements that are not fibers)
        // (We already stopPropagation in the fiber click handler.)
        toggleTube(side, cableId, tubeNumber, tubeDiv, fiberList);
      });
      // If this tube was previously open, restore open state
      if (openStates[tubeNumber]) {
        tubeDiv.classList.add("open");
        fiberList.style.display = "block";
      }
      panel.appendChild(tubeDiv);
      panel.appendChild(fiberList);
    }
  }

  /* --- Multi-Select Fiber Click Handler --- */
  function handleFiberClick(side, cableId, tube, fiber, event) {
    event.stopPropagation();
    let panel = document.getElementById(side + "Tubes");
    let selectedArray = (side === "left") ? selectedLeft : selectedRight;
    let lastSelected = (side === "left") ? lastSelectedLeft : lastSelectedRight;
    // If Shift is pressed and lastSelected exists in same cable and tube:
    if (event.shiftKey && lastSelected && lastSelected.cableId === cableId && lastSelected.tube === tube) {
      let min = Math.min(lastSelected.fiber, fiber);
      let max = Math.max(lastSelected.fiber, fiber);
      let fiberList = panel.querySelector(`.tube[data-tube='${tube}'] + .fiber-list`);
      if (fiberList) {
        let fiberDivs = fiberList.querySelectorAll(".fiber");
        fiberDivs.forEach(div => {
          let f = parseInt(div.getAttribute("data-fiber"), 10);
          if (f >= min && f <= max) {
            if (!div.classList.contains("selected")) {
              div.classList.add("selected");
              if (!selectedArray.some(item => item.cableId === cableId && item.tube === tube && item.fiber === f)) {
                selectedArray.push({ cableId, tube, fiber: f });
              }
            }
          }
        });
      }
    } else if (event.ctrlKey) {
      // Ctrl toggles individual fiber selection
      let fiberDiv = event.currentTarget;
      let index = selectedArray.findIndex(item => item.cableId === cableId && item.tube === tube && item.fiber === fiber);
      if (index !== -1) {
        selectedArray.splice(index, 1);
        fiberDiv.classList.remove("selected");
      } else {
        selectedArray.push({ cableId, tube, fiber });
        fiberDiv.classList.add("selected");
      }
      if (side === "left") { lastSelectedLeft = { cableId, tube, fiber }; }
      else { lastSelectedRight = { cableId, tube, fiber }; }
    } else {
      // No modifier: clear current selection in this panel and select this fiber only.
      let allFibers = panel.querySelectorAll(".fiber");
      allFibers.forEach(f => f.classList.remove("selected"));
      if (side === "left") { selectedLeft = []; } else { selectedRight = []; }
      selectedArray.push({ cableId, tube, fiber });
      event.currentTarget.classList.add("selected");
      if (side === "left") { lastSelectedLeft = { cableId, tube, fiber }; }
      else { lastSelectedRight = { cableId, tube, fiber }; }
    }
    // (Optional) If only one fiber is selected and it has a connection, update the opposite side.
    if (selectedArray.length === 1) {
      let connection;
      if (side === "left") {
        connection = splices.find(s => s.left.cableId === cableId && s.left.tube === tube && s.left.fiber === selectedArray[0].fiber);
        if (connection) {
          document.getElementById("rightCableSelect").value = connection.right.cableId;
          updateTubeList("right");
          setTimeout(() => {
            let rightPanel = document.getElementById("rightTubes");
            // Ensure tube is open:
            let rightTube = rightPanel.querySelector(".tube[data-tube='" + connection.right.tube + "']");
            if (rightTube && !rightTube.classList.contains("open")) {
              rightTube.classList.add("open");
              let fiberList = rightTube.nextElementSibling;
              if (fiberList) {
                fiberList.style.display = "block";
                if (!tubeOpenStates["right"][connection.right.cableId])
                  tubeOpenStates["right"][connection.right.cableId] = {};
                tubeOpenStates["right"][connection.right.cableId][connection.right.tube] = true;
              }
            }
            let rightFiber = rightPanel.querySelector(".fiber[data-fiber='" + connection.right.fiber + "']");
            if (rightFiber) {
              rightFiber.classList.add("selected");
              selectedRight = [{ cableId: connection.right.cableId, tube: connection.right.tube, fiber: connection.right.fiber }];
              lastSelectedRight = { cableId: connection.right.cableId, tube: connection.right.tube, fiber: connection.right.fiber };
            }
          }, 100);
        }
      } else {
        connection = splices.find(s => s.right.cableId === cableId && s.right.tube === tube && s.right.fiber === selectedArray[0].fiber);
        if (connection) {
          document.getElementById("leftCableSelect").value = connection.left.cableId;
          updateTubeList("left");
          setTimeout(() => {
            let leftPanel = document.getElementById("leftTubes");
            let leftTube = leftPanel.querySelector(".tube[data-tube='" + connection.left.tube + "']");
            if (leftTube && !leftTube.classList.contains("open")) {
              leftTube.classList.add("open");
              let fiberList = leftTube.nextElementSibling;
              if (fiberList) {
                fiberList.style.display = "block";
                if (!tubeOpenStates["left"][connection.left.cableId])
                  tubeOpenStates["left"][connection.left.cableId] = {};
                tubeOpenStates["left"][connection.left.cableId][connection.left.tube] = true;
              }
            }
            let leftFiber = leftPanel.querySelector(".fiber[data-fiber='" + connection.left.fiber + "']");
            if (leftFiber) {
              leftFiber.classList.add("selected");
              selectedLeft = [{ cableId: connection.left.cableId, tube: connection.left.tube, fiber: connection.left.fiber }];
              lastSelectedLeft = { cableId: connection.left.cableId, tube: connection.left.tube, fiber: connection.left.fiber };
            }
          }, 100);
        }
      }
    }
  }

  /* --- Add Connection --- */
  function addConnection() {
    if (selectedLeft.length === 0 || selectedRight.length === 0) {
      alert("Please select at least one fiber on both sides before creating a connection.");
      return;
    }
    if (selectedLeft.length !== selectedRight.length) {
      alert("The number of selected fibers on the left and right must be equal.");
      return;
    }
    // Create splice connections pairing fibers in order
    for (let i = 0; i < selectedLeft.length; i++) {
      splices.push({
        id: generateId(),
        left: selectedLeft[i],
        right: selectedRight[i]
      });
    }
    // Clear multi-selections and do not collapse tubes
    selectedLeft = [];
    selectedRight = [];
    lastSelectedLeft = null;
    lastSelectedRight = null;
    // Remove "selected" class from all fibers (but leave the tube open)
    document.querySelectorAll(".fiber.selected").forEach(f => f.classList.remove("selected"));
    updateConnectionsList();
    updateTubeList("left");
    updateTubeList("right");
  }

  /* --- Update Connections List --- */
  function updateConnectionsList() {
    let list = document.getElementById("connectionsList");
    list.innerHTML = "";
    splices.forEach(splice => {
      let leftCable = cables.find(c => c.id === splice.left.cableId);
      let rightCable = cables.find(c => c.id === splice.right.cableId);
      let leftColor = fiberColors[(splice.left.fiber - 1) % fiberColors.length];
      let rightColor = fiberColors[(splice.right.fiber - 1) % fiberColors.length];
      let div = document.createElement("div");
      div.className = "connection";
      div.textContent = `[${leftCable ? leftCable.name : "?"}, Tube ${splice.left.tube}, Fiber ${splice.left.fiber} (${leftColor.name})] ↔ [${rightCable ? rightCable.name : "?"}, Tube ${splice.right.tube}, Fiber ${splice.right.fiber} (${rightColor.name})]`;
      // When clicked, update both panels to highlight the corresponding fibers.
      div.addEventListener("click", function() {
        document.getElementById("leftCableSelect").value = splice.left.cableId;
        updateTubeList("left");
        setTimeout(() => {
          let leftPanel = document.getElementById("leftTubes");
          let leftTube = leftPanel.querySelector(".tube[data-tube='" + splice.left.tube + "']");
          if (leftTube && !leftTube.classList.contains("open")) {
            leftTube.classList.add("open");
            let fiberList = leftTube.nextElementSibling;
            if (fiberList) {
              fiberList.style.display = "block";
              if (!tubeOpenStates["left"][splice.left.cableId])
                tubeOpenStates["left"][splice.left.cableId] = {};
              tubeOpenStates["left"][splice.left.cableId][splice.left.tube] = true;
            }
          }
          let leftFiber = leftPanel.querySelector(".fiber[data-fiber='" + splice.left.fiber + "']");
          if (leftFiber) {
            leftFiber.classList.add("selected");
            selectedLeft = [{ cableId: splice.left.cableId, tube: splice.left.tube, fiber: splice.left.fiber }];
            lastSelectedLeft = { cableId: splice.left.cableId, tube: splice.left.tube, fiber: splice.left.fiber };
          }
        }, 100);
        document.getElementById("rightCableSelect").value = splice.right.cableId;
        updateTubeList("right");
        setTimeout(() => {
          let rightPanel = document.getElementById("rightTubes");
          let rightTube = rightPanel.querySelector(".tube[data-tube='" + splice.right.tube + "']");
          if (rightTube && !rightTube.classList.contains("open")) {
            rightTube.classList.add("open");
            let fiberList = rightTube.nextElementSibling;
            if (fiberList) {
              fiberList.style.display = "block";
              if (!tubeOpenStates["right"][splice.right.cableId])
                tubeOpenStates["right"][splice.right.cableId] = {};
              tubeOpenStates["right"][splice.right.cableId][splice.right.tube] = true;
            }
          }
          let rightFiber = rightPanel.querySelector(".fiber[data-fiber='" + splice.right.fiber + "']");
          if (rightFiber) {
            rightFiber.classList.add("selected");
            selectedRight = [{ cableId: splice.right.cableId, tube: splice.right.tube, fiber: splice.right.fiber }];
            lastSelectedRight = { cableId: splice.right.cableId, tube: splice.right.tube, fiber: splice.right.fiber };
          }
        }, 100);
      });
      list.appendChild(div);
    });
  }

  /* --- Export / Import JSON --- */
  function exportData() {
    const data = { cables, splices };
    const jsonStr = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "fiber_data.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        cables = imported.cables || [];
        splices = imported.splices || [];
        populateDropdowns();
      } catch (err) {
        alert("Error importing JSON data.");
      }
    };
    reader.readAsText(file);
  }

  /* --- Initialize --- */
  populateDropdowns();
  document.getElementById("leftCableSelect").addEventListener("change", () => updateTubeList("left"));
  document.getElementById("rightCableSelect").addEventListener("change", () => updateTubeList("right"));
</script>
</body>
</html>
